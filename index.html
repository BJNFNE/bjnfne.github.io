<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', Arial, sans-serif;
            background: #050508;
            color: #fff;
            overflow: hidden;
        }

        /* ── Animated gradient orbs in the background ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: drift 18s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #6c2bd9, transparent 70%);
            top: -160px;
            left: -160px;
            animation-duration: 20s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1a56e8, transparent 70%);
            bottom: -120px;
            right: -120px;
            animation-duration: 16s;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #9b2de0, transparent 70%);
            top: 50%;
            left: 60%;
            animation-duration: 24s;
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(40px, 30px) scale(1.08);
            }

            100% {
                transform: translate(-20px, 50px) scale(0.96);
            }
        }

        /* ── Subtle grid overlay ── */
        .grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3.5rem 4rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
            max-width: 560px;
            width: 90vw;
            animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(32px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #a78bfa;
            background: rgba(139, 92, 246, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 5px 14px;
            border-radius: 999px;
            margin-bottom: 2rem;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #a78bfa;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        /* ── Heading ── */
        .card h1 {
            font-size: clamp(2.4rem, 6vw, 3.4rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, #ffffff 30%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Sub text ── */
        .card p {
            font-size: 1.05rem;
            font-weight: 300;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 2.5rem;
        }
    </style>
</head>

<body>
    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid"></div>

    <div class="card">
        <div class="badge">
            <span class="badge-dot"></span>
            In development
        </div>
        <h1>Coming Soon</h1>
        <p>We're working hard to bring you something great.<br>Stay tuned — it's almost ready.</p>
    </div>
</body>

</html>
