<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | BJNFNE</title>
    <meta name="theme-color" content="#06060b">
    <meta name="color-scheme" content="dark">
    <meta name="robots" content="noindex, nofollow">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="404 — Page Not Found | BJNFNE">
    <meta property="og:url" content="https://bjnfne.github.io/404.html">
    <meta property="og:site_name" content="BJNFNE">
    <meta property="og:image" content="https://bjnfne.github.io/og-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="404 — Page Not Found | BJNFNE">
    <meta name="twitter:image" content="https://bjnfne.github.io/og-image.png">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/fonts.css">
    
    <!-- Core & Layout -->
    <link rel="stylesheet" href="/css/default.base.css">
    <link rel="stylesheet" href="/css/default.utils.css">
    <link rel="stylesheet" href="/css/default.animations.css">
    <link rel="stylesheet" href="/css/default.responsive.css">
    
    <!-- Components -->
    <link rel="stylesheet" href="/css/default.background.css">
    <link rel="stylesheet" href="/css/default.nav.css">
    <link rel="stylesheet" href="/css/default.hero.css">
    <link rel="stylesheet" href="/css/default.footer.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-grid" aria-hidden="true"></div>
    <canvas id="particles" aria-hidden="true"></canvas>
    <canvas id="cursorTrail" aria-hidden="true"></canvas>
    <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--2" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--3" aria-hidden="true"></div>

    <!-- Navigation -->
    <nav class="nav" id="nav">
        <div class="nav__inner">
            <a href="/" class="nav__logo">
                <span class="nav__logo-bracket">&lt;</span>BJNFNE<span class="nav__logo-bracket">/&gt;</span>
            </a>
            <div class="nav__links">
                <a href="/" class="nav__cta">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Return Home
                </a>
            </div>
        </div>
    </nav>

    <!-- Error Hero Section -->
    <section class="hero" id="hero">
        <div class="container" style="display: flex; justify-content: center;">
            <div class="hero__content">
                <div class="hero__badge" data-animate="fade-up">
                    <span class="hero__badge-dot" style="background-color: #f43f5e; box-shadow: 0 0 10px #f43f5e;"></span>
                    Error 404
                </div>
                <h1 class="hero__title" id="heroTitle" data-animate="fade-up" data-delay="100">
                    404
                </h1>
                <p class="hero__subtitle" data-animate="fade-up" data-delay="200">
                    The page you are looking for has been <span class="text-gradient">lost in the void</span>.
                </p>
                <div class="hero__socials" data-animate="fade-up" data-delay="300" style="margin-top: 2rem;">
                    <a href="/" class="nav__cta" style="font-size: 1rem; padding: 12px 24px; text-decoration: none;">
                        Back to Base System
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Simple Footer for Error Page -->
    <footer class="footer" style="padding: 20px 0; position: absolute; bottom: 0; width: 100%;">
        <div class="container">
            <div class="footer__inner" style="justify-content: center; border-top: none;">
                <div class="footer__copy">
                    &copy; 2024&ndash;2026 BJNFNE. All rights reserved.
                </div>
            </div>
        </div>
    </footer>

    <!-- JS Modules for effects -->
    <script src="/js/app.core.utils.js"></script>
    <script src="/js/app.fx.observer.js"></script>
    <script src="/js/app.fx.glitch.js"></script>
    <script src="/js/app.fx.cursor.js"></script>
    <script src="/js/app.fx.particles.js"></script>

    <!-- Initialize minimal observer for data-animate -->
    <script>
        (function () {
            if (window.Site && window.Site.setupObserver) {
                window.Site.setupObserver();
                document.querySelectorAll('[data-animate]').forEach(window.Site.observeEl);
            }
        })();
    </script>
</body>

</html>
